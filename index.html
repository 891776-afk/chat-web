<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .chat-container {
      width: 400px;
      height: 600px;
      background: #16213e;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .chat-header {
      background: #0f3460;
      padding: 16px 20px;
      color: #e2e2e2;
      font-size: 18px;
      font-weight: 600;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.4;
      word-wrap: break-word;
    }
    .bubble.sent {
      background: #e94560;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .bubble.received {
      background: #0f3460;
      color: #e2e2e2;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .input-area {
      display: flex;
      padding: 12px;
      background: #0f3460;
      gap: 8px;
    }
    .input-area input {
      flex: 1;
      border: none;
      border-radius: 20px;
      padding: 10px 16px;
      background: #16213e;
      color: #e2e2e2;
      font-size: 14px;
      outline: none;
    }
    .input-area button {
      background: #e94560;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">💬 Chat</div>
    <div class="messages" id="messages">
      <div class="bubble received">Hey! This is a demo message.</div>
    </div>
    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Type a message..." />
      <button onclick="sendMessage()">➤</button>
    </div>
  </div>

  <script>
    const input = document.getElementById('messageInput');
    const messages = document.getElementById('messages');

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') sendMessage();
    });

    function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      const bubble = document.createElement('div');
      bubble.className = 'bubble sent';
      bubble.textContent = text;
      messages.appendChild(bubble);
      input.value = '';
      messages.scrollTop = messages.scrollHeight;
    }
  </script>
</body>
</html>
