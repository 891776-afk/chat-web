<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #060d1f;
      height: 100vh;
      width: 100vw;
      display: flex;
      overflow: hidden;
      color: #e2e2e2;
    }

    #authScreen {
      position: fixed;
      inset: 0;
      background: #060d1f;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 30;
    }

    #authBox {
      background: #0d1b3e;
      border-radius: 16px;
      padding: 36px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 340px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }

    #authBox h2 { color: #3b82f6; font-size: 22px; text-align: center; }
    #authBox p  { font-size: 13px; color: #aaa; text-align: center; }

    .warning-note {
      font-size: 12px;
      color: #ffd980;
      background: #7a4f00;
      border-radius: 8px;
      padding: 8px 12px;
      line-height: 1.5;
    }

    #authBox input {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      background: #162447;
      color: #e2e2e2;
      font-size: 15px;
      outline: none;
      width: 100%;
    }

    #authBox input::placeholder { color: #666; }

    #authBox button.primary {
      background: #2563eb;
      border: none;
      border-radius: 10px;
      padding: 12px;
      color: white;
      font-size: 15px;
      cursor: pointer;
      font-weight: 600;
      width: 100%;
    }

    #authBox button.primary:hover { background: #1d4ed8; }

    #authBox button.secondary {
      background: transparent;
      border: 1px solid #1e3a6e;
      border-radius: 10px;
      padding: 10px;
      color: #aaa;
      font-size: 13px;
      cursor: pointer;
      width: 100%;
    }

    #authBox button.secondary:hover { border-color: #3b82f6; color: #3b82f6; }
    #authError { color: #f87171; font-size: 13px; text-align: center; min-height: 18px; }

    .user-btn {
      background: #162447;
      border: 2px solid transparent;
      border-radius: 10px;
      padding: 10px 14px;
      color: #e2e2e2;
      font-size: 15px;
      cursor: pointer;
      text-align: left;
      transition: border 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    .user-btn:hover { border-color: #3b82f6; }
    .user-btn.selected { border-color: #3b82f6; background: #0d1b3e; }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #2563eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }

    .user-avatar.admin-avatar { background: #f5a623; }

    #sidebar {
      width: 260px;
      min-width: 260px;
      background: #0d1b3e;
      display: flex;
      flex-direction: column;
      border-right: 2px solid #2563eb;
    }

    #sidebarHeader {
      padding: 14px 16px;
      border-bottom: 1px solid #060d1f;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    #sidebarHeader h2 { font-size: 18px; font-weight: 700; color: #3b82f6; }

    #logoutBtn {
      background: transparent;
      border: 1px solid #1e3a6e;
      border-radius: 8px;
      color: #aaa;
      font-size: 12px;
      padding: 4px 10px;
      cursor: pointer;
    }

    #logoutBtn:hover { border-color: #3b82f6; color: #3b82f6; }

    #currentUserLabel {
      padding: 8px 16px 12px;
      font-size: 12px;
      color: #aaa;
      border-bottom: 1px solid #060d1f;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #currentUserLabel span { color: #e2e2e2; font-weight: 600; }
    .admin-crown { color: #f5a623; }

    #adminPanelBtn {
      margin: 8px 12px 0;
      background: #f5a623;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      color: #1a1a2e;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: none;
    }

    #roomList { flex: 1; overflow-y: auto; padding: 10px 0; }

    .room-item {
      padding: 12px 18px;
      cursor: pointer;
      font-size: 14px;
      border-left: 3px solid transparent;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .room-item:hover { background: #0a1628; }
    .room-item.active {
      background: #0a1628;
      border-left: 3px solid #3b82f6;
      font-weight: 600;
      color: #3b82f6;
    }

    .room-item-label { display: flex; align-items: center; gap: 8px; }

    #createRoomArea {
      padding: 12px;
      border-top: 1px solid #060d1f;
      display: flex;
      gap: 8px;
    }

    #createRoomArea input {
      flex: 1;
      border: none;
      border-radius: 8px;
      padding: 8px 10px;
      background: #0a1628;
      color: #e2e2e2;
      font-size: 13px;
      outline: none;
    }

    #createRoomArea input::placeholder { color: #666; }

    #createRoomArea button {
      background: #2563eb;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      color: white;
      font-size: 18px;
      cursor: pointer;
      font-weight: 700;
    }

    #createRoomArea button:hover { background: #1d4ed8; }

    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    #chatHeader {
      background: #0d1b3e;
      padding: 14px 20px;
      font-size: 18px;
      font-weight: 600;
      border-bottom: 2px solid #2563eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #onlineList {
      font-size: 12px;
      color: #aaa;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      max-width: 55%;
    }

    .online-badge {
      background: #0a1628;
      border-radius: 12px;
      padding: 3px 10px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .online-dot { width: 7px; height: 7px; border-radius: 50%; background: #4caf50; display: inline-block; }

    .warning-banner {
      background: #7a4f00;
      color: #ffd980;
      font-size: 12px;
      text-align: center;
      padding: 6px 16px;
      border-bottom: 1px solid #b87300;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      max-width: 60%;
      padding: 10px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.5;
      word-wrap: break-word;
      position: relative;
    }

    .bubble.sent {
      background: #2563eb;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .bubble.received {
      background: #0d1b3e;
      color: #e2e2e2;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .bubble.media-bubble { padding: 6px; background: transparent; }
    .bubble.media-bubble.sent  { align-self: flex-end; }
    .bubble.media-bubble.received { align-self: flex-start; }

    .bubble .sender { font-size: 11px; opacity: 0.7; margin-bottom: 4px; padding: 0 4px; }

    .bubble img {
      max-width: 280px;
      max-height: 280px;
      border-radius: 12px;
      display: block;
      cursor: pointer;
      object-fit: cover;
    }

    .bubble video {
      max-width: 280px;
      border-radius: 12px;
      display: block;
    }

    .file-attachment {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0d1b3e;
      border-radius: 12px;
      padding: 10px 14px;
      text-decoration: none;
      color: #e2e2e2;
      font-size: 13px;
      max-width: 240px;
    }

    .file-attachment.sent-file { background: rgba(255,255,255,0.15); }
    .file-icon { font-size: 24px; }
    .file-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

    .delete-msg-btn {
      position: absolute;
      top: 4px;
      right: 6px;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      cursor: pointer;
      display: none;
      line-height: 1;
    }

    .bubble:hover .delete-msg-btn { display: block; }
    .delete-msg-btn:hover { color: #f87171; }

    #uploadProgress {
      background: #0d1b3e;
      padding: 6px 20px;
      font-size: 12px;
      color: #aaa;
      display: none;
      align-items: center;
      gap: 10px;
      border-top: 1px solid #060d1f;
    }

    .progress-bar-wrap {
      flex: 1;
      background: #0a1628;
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: #2563eb;
      border-radius: 4px;
      width: 0%;
      transition: width 0.2s;
    }

    .input-area {
      display: flex;
      padding: 14px 20px;
      background: #0d1b3e;
      gap: 10px;
      border-top: 2px solid #2563eb;
      align-items: center;
    }

    .input-area input[type="text"] {
      flex: 1;
      border: none;
      border-radius: 24px;
      padding: 12px 18px;
      background: #0a1628;
      color: #e2e2e2;
      font-size: 15px;
      outline: none;
    }

    .input-area input[type="text"]::placeholder { color: #888; }

    #fileBtn {
      background: #0a1628;
      border: none;
      border-radius: 50%;
      width: 46px;
      height: 46px;
      color: #aaa;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #fileBtn:hover { background: #2563eb; color: white; }
    #fileInput { display: none; }

    #sendBtn {
      background: #2563eb;
      border: none;
      border-radius: 50%;
      width: 46px;
      height: 46px;
      color: white;
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
    }

    #sendBtn:hover { background: #1d4ed8; }

    #noRoom {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #1e3a6e;
      font-size: 16px;
    }

    #lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 50;
      cursor: zoom-out;
    }

    #lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 10px;
      object-fit: contain;
    }

    #adminPanel {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 25;
    }

    #adminBox {
      background: #0d1b3e;
      border-radius: 16px;
      padding: 30px;
      width: 500px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.7);
      overflow-y: auto;
    }

    #adminBox h2 { color: #f5a623; font-size: 20px; }

    .admin-tabs { display: flex; gap: 8px; }

    .admin-tab {
      flex: 1;
      padding: 8px;
      border: 1px solid #1e3a6e;
      border-radius: 8px;
      background: transparent;
      color: #aaa;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
    }

    .admin-tab.active { background: #f5a623; color: #1a1a2e; border-color: #f5a623; }

    .admin-section { display: none; flex-direction: column; gap: 8px; }
    .admin-section.active { display: flex; }

    .admin-section h3 {
      font-size: 13px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid #162447;
      padding-bottom: 6px;
    }

    .admin-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #162447;
      font-size: 14px;
    }

    .admin-row:last-child { border-bottom: none; }
    .admin-row-label { display: flex; align-items: center; gap: 8px; }

    .preset-tag {
      font-size: 11px;
      background: #162447;
      color: #aaa;
      border-radius: 6px;
      padding: 2px 7px;
    }

    .delete-btn {
      background: #f87171;
      border: none;
      border-radius: 8px;
      padding: 5px 12px;
      color: white;
      font-size: 12px;
      cursor: pointer;
    }

    .delete-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

    #closeAdminBtn {
      background: transparent;
      border: 1px solid #1e3a6e;
      border-radius: 10px;
      padding: 10px;
      color: #aaa;
      font-size: 13px;
      cursor: pointer;
    }

    #closeAdminBtn:hover { border-color: #3b82f6; color: #3b82f6; }
  </style>
</head>
<body>

  <div id="authScreen"><div id="authBox"></div></div>

  <div id="lightbox">
    <img id="lightboxImg" src="" alt="Full size" />
  </div>

  <div id="adminPanel">
    <div id="adminBox">
      <h2>👑 Admin Panel</h2>
      <div class="admin-tabs">
        <button class="admin-tab active" onclick="switchTab('users')">👤 Users</button>
        <button class="admin-tab" onclick="switchTab('rooms')">💬 Rooms</button>
      </div>
      <div class="admin-section active" id="tabUsers">
        <h3>Registered Users</h3>
        <div id="adminUserList"></div>
      </div>
      <div class="admin-section" id="tabRooms">
        <h3>All Rooms</h3>
        <div id="adminRoomList"></div>
      </div>
      <button id="closeAdminBtn">Close</button>
    </div>
  </div>

  <div id="sidebar">
    <div id="sidebarHeader">
      <h2>💬 Rooms</h2>
      <button id="logoutBtn">Log out</button>
    </div>
    <div id="currentUserLabel">Signed in as <span id="currentUserSpan"></span></div>
    <button id="adminPanelBtn">👑 Admin Panel</button>
    <div id="roomList"></div>
    <div id="createRoomArea">
      <input type="text" id="newRoomInput" placeholder="New room name..." maxlength="24" />
      <button id="createRoomBtn">+</button>
    </div>
  </div>

  <div id="main">
    <div id="chatHeader">
      <span id="roomTitle">Select a room</span>
      <div id="onlineList"></div>
    </div>
    <div class="warning-banner">⚠️ Messages are public and stored in plain text — do not send personal information.</div>
    <div id="noRoom">← Select or create a room to start chatting</div>
    <div id="messages" style="display:none;"></div>
    <div id="uploadProgress">
      <span id="uploadLabel">Uploading...</span>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
    </div>
    <div class="input-area" id="inputArea" style="display:none;">
      <button id="fileBtn" title="Attach file">📎</button>
      <input type="file" id="fileInput" accept="image/*,video/*,.pdf,.doc,.docx,.txt,.zip" />
      <input type="text" id="messageInput" placeholder="Type a message..." />
      <button id="sendBtn">➤</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDsxr4LTFI3qoA3S4hy3VFiNw8Q4_cIvSc",
      authDomain: "chat-web-ff05b.firebaseapp.com",
      databaseURL: "https://chat-web-ff05b-default-rtdb.firebaseio.com",
      projectId: "chat-web-ff05b",
      storageBucket: "chat-web-ff05b.firebasestorage.app",
      messagingSenderId: "617118374613",
      appId: "1:617118374613:web:8abe7bbbb513cbd2f8205c"
    };

    firebase.initializeApp(firebaseConfig);
    const db   = firebase.database();
    const auth = firebase.auth();

    const CLOUDINARY_CLOUD  = "dlsay1dy5";
    const CLOUDINARY_PRESET = "chat_uploads";
    const CLOUDINARY_URL    = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/upload`;

    const ADMIN_NAME  = "Brandon";
    const ADMIN_EMAIL = "brandon@chat.app";

    const PRESET_ROOMS = [
      { id: "general", label: "General", icon: "🌐" },
      { id: "gaming",  label: "Gaming",  icon: "🎮" },
      { id: "random",  label: "Random",  icon: "🎲" },
      { id: "tech",    label: "Tech",    icon: "💻" }
    ];

    let username       = "";
    let isAdmin        = false;
    let currentRoom    = null;
    let presenceRef    = null;
    let msgListener    = null;
    let onlineListener = null;

    // ── Auth ──────────────────────────────────────────────────────
    auth.onAuthStateChanged(user => {
      if (user) {
        db.ref("users/" + user.uid + "/name").once("value", snap => {
          username = snap.val() || user.email;
          isAdmin  = (username === ADMIN_NAME);
          document.getElementById("currentUserSpan").textContent = username;
          if (isAdmin) {
            document.getElementById("currentUserLabel").innerHTML =
              `Signed in as <span>${username}</span> <span class="admin-crown">👑</span>`;
            document.getElementById("adminPanelBtn").style.display = "block";
          }
          document.getElementById("authScreen").style.display = "none";
          initRooms();
        });
      } else {
        showLoginScreen();
      }
    });

    // ── Login ─────────────────────────────────────────────────────
    function showLoginScreen() {
      document.getElementById("authScreen").style.display = "flex";
      const box = document.getElementById("authBox");
      box.innerHTML = `
        <h2>💬 Welcome Back</h2>
        <p>Select your account or create a new one</p>
        <div id="userList"></div>
        <div id="authError" style="color:#f87171;font-size:13px;text-align:center;min-height:18px;"></div>
        <div id="passwordSection" style="display:none; flex-direction:column; gap:10px;">
          <input type="password" id="loginPassword" placeholder="Enter your password..." />
          <div id="loginError" style="color:#f87171;font-size:13px;text-align:center;min-height:18px;"></div>
          <button class="primary" id="loginConfirmBtn">Sign In</button>
          <button class="secondary" id="backBtn">← Back</button>
        </div>
        <button class="secondary" id="goRegisterBtn">+ Create new account</button>
      `;
      loadUserList();
      document.getElementById("goRegisterBtn").addEventListener("click", showRegisterScreen);
    }

    function loadUserList() {
      db.ref("usernames").once("value", snap => {
        const data = snap.val() || {};
        const list = document.getElementById("userList");
        list.innerHTML = "";
        if (Object.keys(data).length === 0) {
          list.innerHTML = `<p style="color:#666;font-size:13px;text-align:center;">No accounts yet — create one below.</p>`;
          return;
        }
        Object.entries(data).forEach(([name, email]) => {
          const isAdminUser = name === ADMIN_NAME;
          const btn = document.createElement("button");
          btn.className = "user-btn";
          btn.innerHTML = `
            <div class="user-avatar ${isAdminUser ? "admin-avatar" : ""}">
              ${isAdminUser ? "👑" : name.charAt(0).toUpperCase()}
            </div>${name}`;
          btn.addEventListener("click", () => selectUser(name, email, btn));
          list.appendChild(btn);
        });
      });
    }

    let selectedEmail = "";

    function selectUser(name, email, btnEl) {
      selectedEmail = email;
      document.querySelectorAll(".user-btn").forEach(b => b.classList.remove("selected"));
      btnEl.classList.add("selected");

      const section = document.getElementById("passwordSection");
      section.style.display = "flex";
      document.getElementById("goRegisterBtn").style.display = "none";
      document.getElementById("authError").textContent  = "";
      document.getElementById("loginError").textContent = "";
      document.getElementById("loginPassword").value    = "";
      document.getElementById("loginPassword").focus();

      const oldBtn = document.getElementById("loginConfirmBtn");
      const newBtn = oldBtn.cloneNode(true);
      oldBtn.parentNode.replaceChild(newBtn, oldBtn);
      newBtn.addEventListener("click", () => signIn(email));

      document.getElementById("backBtn").onclick = () => {
        section.style.display = "none";
        document.getElementById("goRegisterBtn").style.display = "block";
        document.getElementById("authError").textContent  = "";
        document.getElementById("loginError").textContent = "";
        document.querySelectorAll(".user-btn").forEach(b => b.classList.remove("selected"));
      };

      document.getElementById("loginPassword").onkeydown = e => {
        if (e.key === "Enter") signIn(email);
      };
    }

    function signIn(email) {
      const password = document.getElementById("loginPassword").value;
      const errEl    = document.getElementById("loginError");

      if (!password) {
        errEl.textContent = "Please enter your password.";
        return;
      }

      const btn = document.getElementById("loginConfirmBtn");
      btn.textContent = "Signing in...";
      btn.disabled    = true;

      auth.signInWithEmailAndPassword(email, password)
        .catch(err => {
          btn.textContent = "Sign In";
          btn.disabled    = false;
          if (err.code === "auth/wrong-password" || err.code === "auth/invalid-credential") {
            errEl.textContent = "Incorrect password. Please try again.";
          } else if (err.code === "auth/too-many-requests") {
            errEl.textContent = "Too many attempts. Please wait a moment.";
          } else {
            errEl.textContent = "Sign in failed. Please try again.";
          }
        });
    }

    // ── Register ──────────────────────────────────────────────────
    function showRegisterScreen() {
      const box = document.getElementById("authBox");
      box.innerHTML = `
        <h2>💬 Create Account</h2>
        <div class="warning-note">⚠️ Messages are public and stored in plain text. Do not use a password you use elsewhere.</div>
        <input type="text"     id="regName"     placeholder="Your display name..." maxlength="20" />
        <input type="password" id="regPassword" placeholder="Choose a password..." />
        <input type="password" id="regConfirm"  placeholder="Confirm password..."  />
        <div id="authError"></div>
        <button class="primary"   id="registerBtn">Create Account</button>
        <button class="secondary" id="backToLoginBtn">← Back to login</button>
      `;
      document.getElementById("registerBtn").addEventListener("click", register);
      document.getElementById("backToLoginBtn").addEventListener("click", showLoginScreen);
      document.getElementById("regConfirm").addEventListener("keydown", e => {
        if (e.key === "Enter") register();
      });
    }

    function register() {
      const name     = document.getElementById("regName").value.trim();
      const password = document.getElementById("regPassword").value;
      const confirm  = document.getElementById("regConfirm").value;
      const errEl    = document.getElementById("authError");
      if (!name)               return errEl.textContent = "Please enter a display name.";
      if (name === ADMIN_NAME) return errEl.textContent = "That name is reserved.";
      if (password.length < 6) return errEl.textContent = "Password must be at least 6 characters.";
      if (password !== confirm) return errEl.textContent = "Passwords do not match.";
      const email = name.toLowerCase().replace(/\s+/g, "") + "@chat.app";
      auth.createUserWithEmailAndPassword(email, password)
        .then(cred => Promise.all([
          db.ref("users/" + cred.user.uid + "/name").set(name),
          db.ref("usernames/" + name).set(email)
        ]))
        .catch(err => {
          errEl.textContent = err.code === "auth/email-already-in-use"
            ? "That name is already taken." : err.message;
        });
    }

    // ── Logout ────────────────────────────────────────────────────
    document.getElementById("logoutBtn").addEventListener("click", () => {
      if (presenceRef) presenceRef.remove();
      auth.signOut();
    });

    // ── Lightbox ──────────────────────────────────────────────────
    const lightbox = document.getElementById("lightbox");
    lightbox.addEventListener("click", () => lightbox.style.display = "none");
    function openLightbox(src) {
      document.getElementById("lightboxImg").src = src;
      lightbox.style.display = "flex";
    }

    // ── File upload via Cloudinary ────────────────────────────────
    document.getElementById("fileBtn").addEventListener("click", () => {
      document.getElementById("fileInput").click();
    });

    document.getElementById("fileInput").addEventListener("change", async e => {
      const file = e.target.files[0];
      if (!file || !currentRoom) return;
      const maxSize = 100 * 1024 * 1024;
      if (file.size > maxSize) {
        alert("File is too large. Maximum size is 100MB.");
        e.target.value = "";
        return;
      }
      const progressBar  = document.getElementById("uploadProgress");
      const progressFill = document.getElementById("progressFill");
      const uploadLabel  = document.getElementById("uploadLabel");
      progressBar.style.display = "flex";
      uploadLabel.textContent   = "Uploading " + file.name + "...";
      progressFill.style.width  = "0%";
      try {
        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", CLOUDINARY_PRESET);
        let fakeProgress = 0;
        const fakeInterval = setInterval(() => {
          fakeProgress = Math.min(fakeProgress + 8, 85);
          progressFill.style.width = fakeProgress + "%";
        }, 200);
        const res  = await fetch(CLOUDINARY_URL, { method: "POST", body: formData });
        const data = await res.json();
        clearInterval(fakeInterval);
        progressFill.style.width = "100%";
        if (data.error) throw new Error(data.error.message);
        await db.ref("messages/" + currentRoom).push({
          sender:    username,
          type:      getFileType(file.type),
          fileName:  file.name,
          fileUrl:   data.secure_url,
          timestamp: Date.now()
        });
      } catch (err) {
        alert("Upload failed: " + err.message);
      } finally {
        progressBar.style.display = "none";
        progressFill.style.width  = "0%";
        e.target.value = "";
      }
    });

    function getFileType(mimeType) {
      if (mimeType.startsWith("image/")) return "image";
      if (mimeType.startsWith("video/")) return "video";
      return "file";
    }

    function getFileIcon(fileName) {
      const ext = fileName.split(".").pop().toLowerCase();
      if (ext === "pdf")                    return "📄";
      if (["doc","docx"].includes(ext))     return "📝";
      if (["xls","xlsx"].includes(ext))     return "📊";
      if (["zip","rar","7z"].includes(ext)) return "🗜️";
      if (["txt","md"].includes(ext))       return "📃";
      return "📎";
    }

    // ── Admin panel ───────────────────────────────────────────────
    document.getElementById("adminPanelBtn").addEventListener("click", openAdminPanel);
    document.getElementById("closeAdminBtn").addEventListener("click", () => {
      document.getElementById("adminPanel").style.display = "none";
    });

    function switchTab(tab) {
      document.querySelectorAll(".admin-tab").forEach((t, i) => {
        t.classList.toggle("active", (i === 0 && tab === "users") || (i === 1 && tab === "rooms"));
      });
      document.getElementById("tabUsers").classList.toggle("active", tab === "users");
      document.getElementById("tabRooms").classList.toggle("active", tab === "rooms");
    }
    window.switchTab = switchTab;

    function openAdminPanel() {
      document.getElementById("adminPanel").style.display = "flex";
      loadAdminUsers();
      loadAdminRooms();
    }

    function loadAdminUsers() {
      const listEl = document.getElementById("adminUserList");
      listEl.innerHTML = "<p style='color:#666;font-size:13px;'>Loading...</p>";
      db.ref("usernames").once("value", snap => {
        const data = snap.val() || {};
        listEl.innerHTML = "";
        Object.entries(data).forEach(([name, email]) => {
          const row = document.createElement("div");
          row.className = "admin-row";
          const label = document.createElement("span");
          label.textContent = name + (name === ADMIN_NAME ? " 👑" : "");
          const delBtn = document.createElement("button");
          delBtn.className = "delete-btn";
          delBtn.textContent = "Delete";
          delBtn.disabled = (name === ADMIN_NAME);
          delBtn.addEventListener("click", () => {
            if (!confirm("Delete account for " + name + "?")) return;
            db.ref("usernames/" + name).remove();
            db.ref("messages").once("value", msgSnap => {
              msgSnap.forEach(roomSnap => {
                roomSnap.forEach(m => { if (m.val().sender === name) m.ref.remove(); });
              });
            });
            row.remove();
          });
          row.appendChild(label);
          row.appendChild(delBtn);
          listEl.appendChild(row);
        });
      });
    }

    function loadAdminRooms() {
      const listEl = document.getElementById("adminRoomList");
      listEl.innerHTML = "";
      PRESET_ROOMS.forEach(r => {
        const row = document.createElement("div");
        row.className = "admin-row";
        const label = document.createElement("div");
        label.className = "admin-row-label";
        label.innerHTML = `${r.icon} ${r.label} <span class="preset-tag">preset</span>`;
        const delBtn = document.createElement("button");
        delBtn.className = "delete-btn";
        delBtn.textContent = "Delete";
        delBtn.addEventListener("click", () => {
          if (!confirm("Delete " + r.label + " and all its messages?")) return;
          db.ref("messages/" + r.id).remove();
          db.ref("presence/" + r.id).remove();
          if (currentRoom === r.id) resetChatView();
          document.querySelectorAll(".room-item").forEach(el => { if (el.dataset.id === r.id) el.remove(); });
          row.remove();
        });
        row.appendChild(label);
        row.appendChild(delBtn);
        listEl.appendChild(row);
      });
      db.ref("rooms").once("value", snap => {
        const data = snap.val() || {};
        Object.entries(data).forEach(([id, val]) => {
          const row = document.createElement("div");
          row.className = "admin-row";
          const label = document.createElement("div");
          label.className = "admin-row-label";
          label.innerHTML = `💬 ${val.label}`;
          const delBtn = document.createElement("button");
          delBtn.className = "delete-btn";
          delBtn.textContent = "Delete";
          delBtn.addEventListener("click", () => {
            if (!confirm("Delete " + val.label + " and all its messages?")) return;
            db.ref("rooms/" + id).remove();
            db.ref("messages/" + id).remove();
            db.ref("presence/" + id).remove();
            if (currentRoom === id) resetChatView();
            document.querySelectorAll(".room-item").forEach(el => { if (el.dataset.id === id) el.remove(); });
            row.remove();
          });
          row.appendChild(label);
          row.appendChild(delBtn);
          listEl.appendChild(row);
        });
      });
    }

    function resetChatView() {
      currentRoom = null;
      document.getElementById("noRoom").style.display = "flex";
      document.getElementById("messages").style.display = "none";
      document.getElementById("inputArea").style.display = "none";
      document.getElementById("roomTitle").textContent = "Select a room";
    }

    // ── Rooms ─────────────────────────────────────────────────────
    function initRooms() {
      const list = document.getElementById("roomList");
      list.innerHTML = "";
      PRESET_ROOMS.forEach(r => addRoomToSidebar(r.id, r.label, r.icon));
      db.ref("rooms").on("value", snap => {
        const data = snap.val() || {};
        document.querySelectorAll(".room-item.custom").forEach(el => el.remove());
        Object.keys(data).forEach(id => {
          if (!PRESET_ROOMS.find(r => r.id === id)) addRoomToSidebar(id, data[id].label, "💬", true);
        });
      });
    }

    function addRoomToSidebar(id, label, icon, isCustom = false) {
      const list = document.getElementById("roomList");
      const item = document.createElement("div");
      item.className = "room-item" + (isCustom ? " custom" : "");
      item.dataset.id = id;
      item.innerHTML = `<div class="room-item-label"><span>${icon}</span>${label}</div>`;
      item.addEventListener("click", () => joinRoom(id, label, icon));
      list.appendChild(item);
    }

    document.getElementById("createRoomBtn").addEventListener("click", createRoom);
    document.getElementById("newRoomInput").addEventListener("keydown", e => { if (e.key === "Enter") createRoom(); });

    function createRoom() {
      const input = document.getElementById("newRoomInput");
      const label = input.value.trim();
      if (!label) return;
      const id = label.toLowerCase().replace(/\s+/g, "-").replace(/[^a-z0-9-]/g, "");
      if (!id) return;
      db.ref("rooms/" + id).set({ label });
      input.value = "";
      joinRoom(id, label, "💬");
    }

    function joinRoom(roomId, roomLabel, roomIcon) {
      if (currentRoom === roomId) return;
      if (presenceRef)    presenceRef.remove();
      if (msgListener)    db.ref("messages/" + currentRoom).off("child_added", msgListener);
      if (onlineListener) db.ref("presence/" + currentRoom).off("value", onlineListener);
      currentRoom = roomId;
      document.querySelectorAll(".room-item").forEach(el => {
        el.classList.toggle("active", el.dataset.id === roomId);
      });
      document.getElementById("roomTitle").textContent   = roomIcon + " " + roomLabel;
      document.getElementById("noRoom").style.display    = "none";
      document.getElementById("messages").style.display  = "flex";
      document.getElementById("inputArea").style.display = "flex";
      document.getElementById("messages").innerHTML      = "";
      document.getElementById("onlineList").innerHTML    = "";
      presenceRef = db.ref("presence/" + roomId + "/" + username);
      presenceRef.set(true);
      presenceRef.onDisconnect().remove();
      onlineListener = db.ref("presence/" + roomId).on("value", snap => {
        const data = snap.val() || {};
        const onlineDiv = document.getElementById("onlineList");
        onlineDiv.innerHTML = "";
        Object.keys(data).forEach(user => {
          const badge = document.createElement("div");
          badge.className = "online-badge";
          badge.innerHTML = `<span class="online-dot"></span>${user}`;
          onlineDiv.appendChild(badge);
        });
      });
      msgListener = db.ref("messages/" + roomId).limitToLast(100).on("child_added", snap => {
        renderMessage(snap.val(), snap.key);
      });
      document.getElementById("messageInput").focus();
    }

    function sendMessage() {
      const input = document.getElementById("messageInput");
      const text  = input.value.trim();
      if (!text || !username || !currentRoom) return;
      db.ref("messages/" + currentRoom).push({
        sender: username,
        type:   "text",
        text,
        timestamp: Date.now()
      });
      input.value = "";
    }

    document.getElementById("sendBtn").addEventListener("click", sendMessage);
    document.getElementById("messageInput").addEventListener("keydown", e => {
      if (e.key === "Enter") sendMessage();
    });

    function renderMessage(data, key) {
      const messages = document.getElementById("messages");
      const isSent   = data.sender === username;
      const type     = data.type || "text";
      const bubble   = document.createElement("div");
      bubble.dataset.key = key;

      if (type === "text") {
        bubble.className = "bubble " + (isSent ? "sent" : "received");
        if (!isSent) {
          const label = document.createElement("div");
          label.className = "sender";
          label.textContent = data.sender;
          bubble.appendChild(label);
        }
        bubble.appendChild(document.createTextNode(data.text));
      } else {
        bubble.className = "bubble media-bubble " + (isSent ? "sent" : "received");
        if (!isSent) {
          const label = document.createElement("div");
          label.className = "sender";
          label.textContent = data.sender;
          bubble.appendChild(label);
        }
        if (type === "image") {
          const img = document.createElement("img");
          img.src = data.fileUrl;
          img.alt = data.fileName;
          img.addEventListener("click", () => openLightbox(data.fileUrl));
          bubble.appendChild(img);
        } else if (type === "video") {
          const video = document.createElement("video");
          video.src      = data.fileUrl;
          video.controls = true;
          bubble.appendChild(video);
        } else {
          const link = document.createElement("a");
          link.href      = data.fileUrl;
          link.target    = "_blank";
          link.className = "file-attachment" + (isSent ? " sent-file" : "");
          link.innerHTML = `
            <span class="file-icon">${getFileIcon(data.fileName)}</span>
            <span class="file-name">${data.fileName}</span>
            <span>⬇</span>
          `;
          bubble.appendChild(link);
        }
      }

      if (isAdmin) {
        const delBtn = document.createElement("button");
        delBtn.className   = "delete-msg-btn";
        delBtn.textContent = "✕";
        delBtn.title       = "Delete message";
        delBtn.addEventListener("click", () => {
          db.ref("messages/" + currentRoom + "/" + key).remove();
          bubble.remove();
        });
        bubble.appendChild(delBtn);
      }

      messages.appendChild(bubble);
      messages.scrollTop = messages.scrollHeight;
    }
  </script>

</body>
</html>
