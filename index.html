<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: #0f3460;
      padding: 16px 24px;
      color: #e2e2e2;
      font-size: 20px;
      font-weight: 600;
      border-bottom: 2px solid #e94560;
    }

    .warning-banner {
      background: #7a4f00;
      color: #ffd980;
      font-size: 12px;
      text-align: center;
      padding: 7px 16px;
      border-bottom: 1px solid #b87300;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      max-width: 60%;
      padding: 10px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .bubble.sent {
      background: #e94560;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .bubble.received {
      background: #0f3460;
      color: #e2e2e2;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .bubble .sender {
      font-size: 11px;
      opacity: 0.7;
      margin-bottom: 4px;
    }

    .input-area {
      display: flex;
      padding: 14px 20px;
      background: #0f3460;
      gap: 10px;
      border-top: 2px solid #e94560;
    }

    .input-area input {
      flex: 1;
      border: none;
      border-radius: 24px;
      padding: 12px 18px;
      background: #16213e;
      color: #e2e2e2;
      font-size: 15px;
      outline: none;
    }

    .input-area input::placeholder { color: #888; }

    .input-area button {
      background: #e94560;
      border: none;
      border-radius: 50%;
      width: 46px;
      height: 46px;
      color: white;
      font-size: 20px;
      cursor: pointer;
    }

    .input-area button:hover { background: #c73652; }

    #nameOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    #nameBox {
      background: #16213e;
      border-radius: 16px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 320px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    #nameBox h2 { color: #e2e2e2; font-size: 20px; }

    #nameBox .warning-note {
      font-size: 12px;
      color: #ffd980;
      background: #7a4f00;
      border-radius: 8px;
      padding: 8px 12px;
      line-height: 1.5;
    }

    #nameBox input {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      background: #0f3460;
      color: #e2e2e2;
      font-size: 15px;
      outline: none;
    }

    #nameBox button {
      background: #e94560;
      border: none;
      border-radius: 10px;
      padding: 12px;
      color: white;
      font-size: 15px;
      cursor: pointer;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div id="nameOverlay">
    <div id="nameBox">
      <h2>Enter your name to chat</h2>
      <div class="warning-note">
        ⚠️ Messages are visible to everyone and stored in plain text. Do not send passwords, addresses, or any personal information.
      </div>
      <input type="text" id="nameInput" placeholder="Your name..." maxlength="20" />
      <button id="joinBtn">Join Chat</button>
    </div>
  </div>

  <div class="chat-header"> Betty Chat</div>
  <div class="warning-banner">⚠️ Messages are public and stored in plain text — do not send personal information.</div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <input type="text" id="messageInput" placeholder="Type a message or not idc..." />
    <button id="sendBtn">➤</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDsxr4LTFI3qoA3S4hy3VFiNw8Q4_cIvSc",
      authDomain: "chat-web-ff05b.firebaseapp.com",
      databaseURL: "https://chat-web-ff05b-default-rtdb.firebaseio.com",
      projectId: "chat-web-ff05b",
      storageBucket: "chat-web-ff05b.firebasestorage.app",
      messagingSenderId: "617118374613",
      appId: "1:617118374613:web:8abe7bbbb513cbd2f8205c"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const messagesRef = db.ref("messages");

    let username = "";

    function setName() {
      const val = document.getElementById("nameInput").value.trim();
      if (!val) return;
      username = val;
      document.getElementById("nameOverlay").style.display = "none";
      document.getElementById("messageInput").focus();
    }

    document.getElementById("joinBtn").addEventListener("click", setName);
    document.getElementById("nameInput").addEventListener("keydown", e => {
      if (e.key === "Enter") setName();
    });

    function sendMessage() {
      const input = document.getElementById("messageInput");
      const text = input.value.trim();
      if (!text || !username) return;

      messagesRef.push({
        sender: username,
        text: text,
        timestamp: Date.now()
      });

      input.value = "";
    }

    document.getElementById("sendBtn").addEventListener("click", sendMessage);
    document.getElementById("messageInput").addEventListener("keydown", e => {
      if (e.key === "Enter") sendMessage();
    });

    messagesRef.on("child_added", snapshot => {
      const data = snapshot.val();
      const messages = document.getElementById("messages");
      const isSent = data.sender === username;

      const bubble = document.createElement("div");
      bubble.className = "bubble " + (isSent ? "sent" : "received");

      if (!isSent) {
        const senderLabel = document.createElement("div");
        senderLabel.className = "sender";
        senderLabel.textContent = data.sender;
        bubble.appendChild(senderLabel);
      }

      bubble.appendChild(document.createTextNode(data.text));
      messages.appendChild(bubble);
      messages.scrollTop = messages.scrollHeight;
    });
  </script>

</body>
</html>
